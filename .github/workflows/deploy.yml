name: Deploy to Synology NAS

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/erisme/30carats-scores:latest

      - name: Copy docker-compose.yml to NAS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.NAS_HOST }}
          username: ${{ secrets.NAS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.NAS_PORT }}
          source: "docker-compose.yml"
          target: ${{ secrets.NAS_DEPLOY_PATH }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
        with:
          host: ${{ secrets.NAS_HOST }}
          username: ${{ secrets.NAS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.NAS_PORT }}
          envs: GHCR_TOKEN,GHCR_USER
          script: |
            export PATH=$PATH:/usr/local/bin:/usr/bin
            mkdir -p ${{ secrets.NAS_DEPLOY_PATH }}
            docker login ghcr.io -u "$GHCR_USER" -p "$GHCR_TOKEN"
            cd ${{ secrets.NAS_DEPLOY_PATH }}
            docker compose pull
            docker compose up -d
